        <nav>

    <section class="map-page">
        <h1>Explore Boston Restaurants</h1>

        <div class="viz-block">

                frameborder="0"

            <h3>Ratings vs. Price</h3>
            <iframe
                src="website_output/scatter_plot.html"

                height="500"

                loading="lazy"

            </iframe>
        </div>
